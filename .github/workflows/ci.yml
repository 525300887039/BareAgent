name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Run the default suite on both the Linux CI target and the Windows dev
    # platform, so platform-divergent bugs (paths, CRLF, encoding) surface in CI.
    # fail-fast: false so one OS failing doesn't cancel the other's result.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv (+ Python 3.12)
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        # ruff results are platform-independent; run it once (on Linux) only.
        if: runner.os == 'Linux'
        run: uv run ruff check src tests

      - name: Test (pytest)
        run: uv run pytest

  socket:
    name: Socket tests (localhost)
    # The localhost-socket suite (web viewer + MCP http transport) is excluded
    # from the default run because it flakes on dev loopback; run it here on Linux
    # where loopback is reliable, so it isn't left with zero automated coverage.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv (+ Python 3.12)
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Socket tests (pytest -m socket)
        run: uv run pytest -m socket

  notify:
    name: Track main status
    needs: [test, socket]
    # Only on pushes to main, regardless of whether the upstream jobs passed or
    # failed, so we can both open the tracking issue on red and close it on recovery.
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Open / close the CI-failure tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/ci_notify.py \
            --conclusion "test:${{ needs.test.result }}" \
            --conclusion "socket:${{ needs.socket.result }}" \
            --sha "${{ github.sha }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
