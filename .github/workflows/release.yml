name: Publish to PyPI

# Tag push (vX.Y.Z) -> publish to PyPI.
# Manual run (workflow_dispatch) -> publish to TestPyPI for a dry run.
#
# Auth is PyPI Trusted Publishing (OIDC) — no API token is stored in GitHub
# Secrets. See docs/releasing.md for the one-time pending-publisher binding on
# pypi.org / test.pypi.org and the GitHub Environments setup.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # hatch-vcs derives the version from git tags; a shallow clone hides
          # tags and breaks versioning, so fetch full history + tags.
          fetch-depth: 0
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: uv build
      - name: Check distribution metadata
        run: uvx twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    # Only on a version tag push.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bareagent-cli
    permissions:
      id-token: write          # MANDATORY for Trusted Publishing (this job only)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No user/password: OIDC Trusted Publishing is implicit.

  publish-to-testpypi:
    name: Publish to TestPyPI (dry run)
    # Only on a manual run.
    if: github.event_name == 'workflow_dispatch'
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/bareagent-cli
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # Re-dispatching the dry run can reuse a dev version; don't fail on it.
          skip-existing: true
