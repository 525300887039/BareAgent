[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "bareagent"
version = "0.1.0"
description = "BareAgent is a pure Python terminal code agent."
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.52",
    "openai>=1.70",
    "rich>=14.0",
    "textual>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.11",
    "textual-dev>=1.0",
]
langfuse = ["langfuse>=2.0"]
otel = [
    "opentelemetry-api>=1.20",
    "opentelemetry-sdk>=1.20",
    "opentelemetry-exporter-otlp-proto-http>=1.20",
]
all-tracing = ["bareagent[langfuse,otel]"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.11",
]

[project.scripts]
bareagent = "src.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.hatch.build.targets.wheel.force-include]
"config.toml" = "config.toml"
"skills" = "skills"

[tool.hatch.build.targets.sdist]
include = [
    "src",
    "skills",
    "config.toml",
    "README.md",
]
